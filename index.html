<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NileDesk Chatbot</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      width: 420px;
      height: 600px;
      background: #fff;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .header {
      padding: 12px;
      background: #2d6cdf;
      color: white;
      text-align: center;
      font-weight: bold;
    }

    .messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      background: #f9f9f9;
    }

    .msg {
      margin: 8px 0;
      padding: 8px 10px;
      border-radius: 8px;
      max-width: 80%;
      word-wrap: break-word;
    }

    .user {
      background: #d1e7ff;
      align-self: flex-end;
    }

    .bot {
      background: #e9e9e9;
      align-self: flex-start;
    }

    .input-area {
      display: flex;
      border-top: 1px solid #ddd;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      outline: none;
    }

    button {
      padding: 12px 16px;
      border: none;
      background: #2d6cdf;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #1f56c2;
    }
  </style>
</head>

<body>

<div class="chat-container">
  <div class="header">NileDesk AI Chat</div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input type="text" id="input" placeholder="Type your message..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  // Generate unique session id
  const sessionId = crypto.randomUUID();

  const messagesDiv = document.getElementById("messages");

  function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = `msg ${type}`;
    div.innerText = text;
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  async function sendMessage() {
    const input = document.getElementById("input");
    const msg = input.value.trim();
    if (!msg) return;

    addMessage(msg, "user");
    input.value = "";

    try {
      const res = await fetch("https://app.niledesk.com/api/AIAgent/tests/6a0492348c1fee51e45a9ba9", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-Agent-Token": "900232c7-b358-4abe-84a7-3fdc260de1db"
        },
        body: JSON.stringify({
          msg: msg,
          session_id: sessionId
        })
      });

      const data = await res.json();

      addMessage(data.response || "No response", "bot");

    } catch (err) {
      addMessage("Error calling API", "bot");
      console.error(err);
    }
  }

  // Optional: show session id in console
  console.log("Session ID:", sessionId);
</script>

</body>
</html>
