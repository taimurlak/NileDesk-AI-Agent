<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NileDesk Chatbot</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100dvh;
    }

    .chat-container {
      width: 100%;
      max-width: 480px;
      height: 100dvh;
      max-height: 720px;
      background: #fff;
      display: flex;
      flex-direction: column;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .header {
      padding: 14px;
      background: #2d6cdf;
      color: white;
      text-align: center;
      font-weight: bold;
      font-size: 16px;
    }

    .messages {
      flex: 1;
      padding: 12px;
      overflow-y: auto;
      background: #f9f9f9;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg {
      padding: 10px 12px;
      border-radius: 10px;
      max-width: 80%;
      word-wrap: break-word;
      font-size: 14px;
      line-height: 1.4;
    }

    .user {
      background: #d1e7ff;
      align-self: flex-end;
    }

    .bot {
      background: #e9e9e9;
      align-self: flex-start;
    }

    .input-area {
      display: flex;
      padding: 10px;
      gap: 8px;
      border-top: 1px solid #ddd;
      background: #fff;
    }

    input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      outline: none;
      font-size: 14px;
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      background: #2d6cdf;
      color: white;
      font-size: 14px;
      cursor: pointer;
      min-width: 70px;
    }

    button:active {
      transform: scale(0.98);
    }

    /* Mobile tweaks */
    @media (max-width: 600px) {
      .chat-container {
        height: 100dvh;
        border-radius: 0;
      }

      .msg {
        max-width: 90%;
        font-size: 13px;
      }

      input {
        font-size: 13px;
      }

      button {
        font-size: 13px;
      }
    }
  </style>
</head>

<body>

<div class="chat-container">
  <div class="header">NileDesk AI Chat</div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input type="text" id="input" placeholder="Type your message..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  const sessionId = crypto.randomUUID();
  const messagesDiv = document.getElementById("messages");

  function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = `msg ${type}`;
    div.innerText = text;
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  async function sendMessage() {
    const input = document.getElementById("input");
    const msg = input.value.trim();
    if (!msg) return;

    addMessage(msg, "user");
    input.value = "";

    try {
      const res = await fetch("https://app.niledesk.com/api/AIAgent/tests/6a0492348c1fee51e45a9ba9", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-Agent-Token": "900232c7-b358-4abe-84a7-3fdc260de1db"
        },
        body: JSON.stringify({
          msg: msg,
          session_id: sessionId
        })
      });

      const data = await res.json();
      addMessage(data.response || "No response", "bot");

    } catch (err) {
      addMessage("Error calling API", "bot");
      console.error(err);
    }
  }

  // Enter key support
  document.getElementById("input").addEventListener("keypress", function (e) {
    if (e.key === "Enter") sendMessage();
  });
</script>

</body>
</html>
